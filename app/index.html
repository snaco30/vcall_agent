<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가맹점 마스터 및 이력 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        /* 가로 스크롤바 미려하게 커스텀 */
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

<nav class="bg-slate-900 text-white shadow-md sticky top-0 z-40">
    <div class="max-w-[1600px] mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white font-bold tracking-wider text-sm shadow-md shadow-blue-900/30">CRM</div>
            <h1 class="text-xl font-bold tracking-tight">가맹점 마스터 정보 조회 콘솔</h1>
        </div>
        <div class="text-xs text-slate-400 font-medium">MDB 통합 웹 인터페이스 v2.0</div>
    </div>
</nav>

<div class="max-w-[1600px] mx-auto px-6 py-8">
    <div class="bg-white rounded-2xl border border-slate-200/80 p-6 shadow-sm mb-6 transition-all duration-300 hover:shadow-md">
        <div class="mb-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center">
                <span class="w-1.5 h-4 bg-blue-600 rounded-full mr-2"></span>가맹점 데이터 스캔 및 매핑
            </h2>
            <p class="text-xs text-slate-500 mt-1">조회하고자 하는 가맹점의 상호명, 전화번호, 대표자명 또는 사업자등록번호 10자리를 입력하세요.</p>
        </div>
        <form id="searchForm" onsubmit="handleSearch(event)">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="searchInput" 
                       class="form-control flex-1 px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all placeholder:text-slate-400" 
                       placeholder="상호, 전화번호, 대표자, 사업자번호 입력...">
                <button type="submit" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-8 py-3.5 rounded-xl shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 active:scale-[0.99] transition-all duration-150">
                    조회하기
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
        <div class="overflow-x-auto custom-scrollbar">
            <table class="w-full text-center border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs font-bold uppercase tracking-wider">
                        <th class="py-4 px-4">사업자번호</th>
                        <th class="py-4 px-4 text-left">가맹점명 (상호)</th>
                        <th class="py-4 px-4">업체유형</th>
                        <th class="py-4 px-4">핸드폰 (전화)</th>
                        <th class="py-4 px-4 text-left">주소</th>
                        <th class="py-4 px-4">대표자</th>
                        <th class="py-4 px-4">등록일자</th>
                        <th class="py-4 px-4">관리담당자</th>
                        <th class="py-4 px-4">연체정보</th>
                        <th class="py-4 px-4 text-left">비고</th>
                    </tr>
                </thead>
                <tbody id="merchantTableBody" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                    <tr>
                        <td colspan="10" class="text-slate-400 py-24 text-center font-normal">
                            <svg class="w-1

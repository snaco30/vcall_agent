<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가맹점 마스터 및 이력 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .container { max-width: 1500px; margin-top: 40px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table th { background-color: #f1f3f5; font-weight: bold; font-size: 0.9rem; }
        .table td { font-size: 0.9rem; vertical-align: middle; }
        .badge-danger { background-color: #dc3545; color: white; }
        .badge-success { background-color: #198754; color: white; }
        /* 이력 모달 가로 스크롤 최적화 */
        .history-table th, .history-table td { white-space: nowrap; padding: 0.5rem 1rem; }
        .merchant-link { cursor: pointer; text-decoration: underline; color: #0d6efd; font-weight: bold; }
        .merchant-link:hover { color: #0a58ca; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4 mb-4">
        <h2 class="border-start border-primary border-4 ps-2 fw-bold text-dark">가맹점 마스터 정보 조회 시스템</h2>
        <p class="text-muted mb-0">마스터 정보를 스캔하며, <b>가맹점명(상호)</b>을 클릭하면 상세 통화 이력이 팝업으로 나타납니다.</p>
    </div>

    <div class="card p-3 mb-4">
        <form id="searchForm" onsubmit="handleSearch(event)">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="조회할 가맹점 상호명, 전화번호, 대표자명 또는 사업자번호를 입력하세요.">
                <button type="submit" class="btn btn-primary btn-lg px-4 fw-bold">조회하기</button>
            </div>
        </form>
    </div>

    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead>
                    <tr>
                        <th style="width: 10%;">사업자번호</th>
                        <th style="width: 15%;">가맹점명 (상호)</th>
                        <th style="width: 8%;">업체유형</th>
                        <th style="width: 12%;">핸드폰 (전화)</th>
                        <th style="width: 18%;">주소</th>
                        <th style="width: 7%;">대표자</th>
                        <th style="width: 9%;">등록일자</th>
                        <th style="width: 7%;">관리담당자</th>
                        <th style="width: 6%;">연체정보</th>
                        <th style="width: 8%;">비고</th>
                    </tr>
                </thead>
                <tbody id="merchantTableBody">
                    <tr>
                        <td colspan="10" class="text-muted py-5">상단 검색창에 키워드를 입력 후 [조회하기] 버튼을 눌러주세요.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold" id="historyModalTitle">통화 이력 상세내역</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light">
                <div class="table-responsive bg-white border rounded">
                    <table class="table table-bordered table-striped table-hover history-table mb-0 text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>전화번호</th>
                                <th>통화일시</th>
                                <th>상호</th>
                                <th>통화내용</th>
                                <th>업무유형</th>
                                <th>업무상세</th>
                                <th>처리상태</th>
                                <th>처리결과</th>
                                <th>처리자</th>
                                <th>확인여부</th>
                                <th>전화건사람</th>
                                <th>전처리자</th>
                                <th>인계자</th>
                                <th>처리일시</th>
                                <th>사후처리</th>
                                <th>사후처리상세</th>
                                <th>이전통화</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 💡 팝업 모달 객체 초기화
    let historyModal;
    document.addEventListener("DOMContentLoaded", function() {
        historyModal = new bootstrap.Modal(document.getElementById('historyModal'));
    });

    function handleSearch(event) {
        event.preventDefault();
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) { alert('검색어를 입력해 주세요.'); return; }
        loadData(keyword);
    }

    function loadData(searchKeyword) {
        const tableBody = document.getElementById('merchantTableBody');
        tableBody.innerHTML = '<tr><td colspan="10" class="text-muted py-5"><div class="spinner-border spinner-border-sm text-primary me-2"></div>마스터 데이터를 스캔 중입니다...</td></tr>';

        fetch(`/api/merchants?search=${encodeURIComponent(searchKeyword)}`)
            .then(res => res.json())
            .then(data => {
                tableBody.innerHTML = '';
                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="10" class="text-muted py-5">일치하는 가맹점 마스터 데이터가 없습니다.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const row = document.createElement('tr');
                    const delayBadge = (item.delay_info && item.delay_info !== "정상" && item.delay_info !== "-")
                        ? `<span class="badge badge-danger">${item.delay_info}</span>`
                        : `<span class="badge badge-success">정상</span>`;

                    row.innerHTML = `
                        <td class="font-monospace">${item.saup_no || '-'}</td>
                        <td class="text-start"><a class="merchant-link" onclick="openHistory('${item.saup_no}', '${item.tel_no}', '${item.name}')">${item.name || '-'}</a></td>
                        <td><span class="badge bg-secondary">${item.mer_type || '-'}</span></td>
                        <td>${item.tel_no || '-'}</td>
                        <td class="text-start">${item.addr || '-'}</td>
                        <td class="fw-bold">${item.presi_name || '-'}</td>
                        <td class="text-muted">${item.regi_date || '-'}</td>
                        <td>${item.damdang || '-'}</td>
                        <td>${delayBadge}</td>
                        <td class="text-start text-muted">${item.bigo || '-'}</td>
                    `;
                    tableBody.innerHTML += row.outerHTML;
                });
            })
            .catch(err => {
                tableBody.innerHTML = `<tr><td colspan="10" class="text-danger py-5">데이터 연동 실패</td></tr>`;
            });
    }

    // 💡 상호명 클릭 시 통화 이력을 가져와 모달에 뿌려주는 함수
    function openHistory(saupNo, telNo, merName) {
        const hBody = document.getElementById('historyTableBody');
        document.getElementById('historyModalTitle').innerText = `[${merName}] 가맹점 최근 통화내역`;
        hBody.innerHTML = '<tr><td colspan="17" class="py-5 text-center"><div class="spinner-border spinner-border-sm text-primary"></div> 이력을 불러오는 중입니다...</td></tr>';
        
        historyModal.show();

        fetch(`/api/history?saup_no=${encodeURIComponent(saupNo)}&tel_no=${encodeURIComponent(telNo)}`)
            .then(res => res.json())
            .then(data => {
                hBody.innerHTML = '';
                if (!data || data.length === 0) {
                    hBody.innerHTML = '<tr><td colspan="17" class="text-muted py-5 text-center">해당 가맹점의 통화 이력이 존재하지 않습니다.</td></tr>';
                    return;
                }

                data.forEach(h => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${h.tel_no || '-'}</td>
                        <td class="font-monospace">${h.regi_time || '-'}</td>
                        <td class="fw-bold text-primary">${h.mer_name || '-'}</td>
                        <td class="text-start">${h.content || '-'}</td>
                        <td>${h.upmu_type || '-'}</td>
                        <td>${h.upmu_det || '-'}</td>
                        <td>${h.proc_type || '-'}</td>
                        <td>${h.res || '-'}</td>
                        <td>${h.proc_name || '-'}</td>
                        <td>${h.ok_yn || '-'}</td>
                        <td>${h.snd_name || '-'}</td>
                        <td>${h.prev_name || '-'}</td>
                        <td>${h.takeover || '-'}</td>
                        <td class="font-monospace">${h.churi_time || '-'}</td>
                        <td>${h.after_type || '-'}</td>
                        <td>${h.after_det || '-'}</td>
                        <td>${h.before_time || '-'}</td>
                    `;
                    hBody.innerHTML += row.outerHTML;
                });
            })
            .catch(err => {
                hBody.innerHTML = `<tr><td colspan="17" class="text-danger py-5 text-center">통화 이력 조회 실패</td></tr>`;
            });
    }
</script>
</body>
</html>

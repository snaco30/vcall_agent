<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이력 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans KR', 'sans-serif'] },
                    colors: {
                        surface: { DEFAULT: '#fafafa', card: '#ffffff' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f4f4f5; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.45s ease-out both; }
        @keyframes cuteAnimalSlideInNext {
            from { opacity: 0; transform: translateX(72px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes cuteAnimalSlideInPrev {
            from { opacity: 0; transform: translateX(-72px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .cute-animal-animate-next {
            animation: cuteAnimalSlideInNext 0.75s cubic-bezier(0.55, 0.055, 0.675, 0.19) both;
        }
        .cute-animal-animate-prev {
            animation: cuteAnimalSlideInPrev 0.75s cubic-bezier(0.55, 0.055, 0.675, 0.19) both;
        }
        .search-chip {
            transition: all 0.15s ease;
        }
        .search-chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.12);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50/40 via-zinc-50 to-zinc-100 text-zinc-800 antialiased min-h-screen">

<!-- Login -->
<div id="loginSection" class="fixed inset-0 z-50 bg-gradient-to-br from-indigo-50 via-white to-zinc-100 flex justify-center items-center p-4">
    <div class="bg-white rounded-xl shadow-xl shadow-zinc-200/50 w-full max-w-md p-8 ring-1 ring-zinc-200/60">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-xl text-white font-bold text-lg shadow-lg shadow-indigo-600/20 mb-4">V</div>
            <div class="inline-block bg-indigo-50 text-indigo-700 font-semibold px-3 py-1 rounded-full text-xs tracking-wide mb-3 ring-1 ring-indigo-100">V-CALL SECURITY</div>
            <h3 class="text-2xl font-bold text-zinc-900">가맹점 관리 콘솔</h3>
            <p class="text-sm text-zinc-500 mt-2">인증된 관리자 계정만 접근할 수 있습니다.</p>
        </div>
        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-semibold text-zinc-600">관리자 아이디</label>
                    <label class="flex items-center gap-1.5 cursor-pointer select-none">
                        <input type="checkbox" id="rememberUsername" class="w-3.5 h-3.5 rounded border-zinc-300 text-indigo-600 focus:ring-indigo-500/30">
                        <span class="text-xs text-zinc-500">아이디 저장</span>
                    </label>
                </div>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <input type="text" id="username" required class="w-full pl-10 pr-4 py-3 bg-white ring-1 ring-zinc-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:ring-indigo-500 transition-all" placeholder="아이디 입력">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-600 mb-2">비밀번호</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 bg-white ring-1 ring-zinc-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:ring-indigo-500 transition-all" placeholder="비밀번호 입력">
                </div>
            </div>
            <div id="loginError" class="hidden text-xs text-rose-700 font-medium bg-rose-50 border border-rose-200 rounded-lg px-3 py-2.5"></div>
            <button type="submit" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold text-sm py-3.5 rounded-lg transition-all shadow-md shadow-indigo-600/15">
                인증 및 시스템 접속
            </button>
        </form>
    </div>
</div>

<!-- Dashboard -->
<div id="mainDashboard" class="hidden min-h-screen">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-zinc-200/80">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3.5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 w-9 h-9 rounded-lg text-white font-bold text-sm flex items-center justify-center shadow-sm">V</div>
                <div>
                    <h1 class="text-base sm:text-lg font-bold text-zinc-900 tracking-tight">가맹점 마스터 정보 조회</h1>
                    <p class="text-xs text-zinc-500 hidden sm:block">V-CALL 관리 콘솔</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="userInfo" class="flex items-center gap-2 text-xs font-medium text-zinc-600 bg-zinc-50 px-3 py-1.5 rounded-lg ring-1 ring-zinc-200/80"></div>
                <button onclick="handleLogout()" class="text-xs text-zinc-600 hover:text-zinc-900 hover:bg-zinc-100 font-medium px-3 py-1.5 rounded-lg transition-all">로그아웃</button>
            </div>
        </div>
    </nav>

    <div id="syncStatusBar" class="hidden border-b text-xs">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-2 flex flex-wrap items-center gap-x-3 gap-y-1">
            <span class="font-medium text-zinc-600">데이터 기준 시각</span>
            <span id="syncStatusTime" class="font-semibold text-zinc-800">-</span>
            <span id="syncStatusWarning" class="hidden text-amber-700 font-medium"></span>
            <button type="button" id="syncTriggerBtn" onclick="triggerMdbSync()" class="ml-auto inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-indigo-600 text-white hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                데이터 동기화
            </button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Search Panel -->
        <div class="bg-white rounded-xl ring-1 ring-zinc-200/60 shadow-sm p-5 sm:p-6 mb-6 fade-in-up">
            <div class="mb-5 flex items-start gap-3">
                <div class="flex-shrink-0 w-9 h-9 bg-indigo-50 rounded-lg flex items-center justify-center ring-1 ring-indigo-100">
                    <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <div>
                    <h2 class="text-base font-bold text-zinc-900">가맹점 데이터 스캔 및 매핑</h2>
                    <p class="text-xs text-zinc-500 mt-1">상호명, 전화번호, 대표자명 또는 사업자등록번호로 조회합니다.</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-1.5 mb-4">
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100">상호명</span>
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100">전화번호</span>
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100">대표자</span>
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100">사업자번호</span>
            </div>
            <form id="searchForm" onsubmit="handleSearch(event)">
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-1">
                        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" id="searchInput" class="w-full pl-10 pr-4 py-3 bg-white ring-1 ring-zinc-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:ring-indigo-500 focus:shadow-lg focus:shadow-indigo-500/10 transition-all" placeholder="상호, 전화번호, 대표자, 사업자번호 입력...">
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-semibold text-sm px-6 sm:px-8 py-3 rounded-lg shadow-md shadow-indigo-600/15 hover:shadow-lg hover:shadow-indigo-600/20 transition-all flex items-center justify-center gap-2 sm:min-w-[120px]">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        조회하기
                    </button>
                </div>
            </form>
            <div class="mt-4 flex flex-wrap items-center gap-2">
                <span class="text-[11px] font-medium text-zinc-400">빠른 검색</span>
                <button type="button" onclick="quickSearch('010')" class="search-chip inline-flex items-center px-3 py-1 rounded-full text-[11px] font-medium bg-zinc-50 text-zinc-600 ring-1 ring-zinc-200 hover:bg-indigo-50 hover:text-indigo-700 hover:ring-indigo-200">010</button>
                <button type="button" onclick="quickSearch('카페')" class="search-chip inline-flex items-center px-3 py-1 rounded-full text-[11px] font-medium bg-zinc-50 text-zinc-600 ring-1 ring-zinc-200 hover:bg-indigo-50 hover:text-indigo-700 hover:ring-indigo-200">카페</button>
                <button type="button" onclick="quickSearch('대표')" class="search-chip inline-flex items-center px-3 py-1 rounded-full text-[11px] font-medium bg-zinc-50 text-zinc-600 ring-1 ring-zinc-200 hover:bg-indigo-50 hover:text-indigo-700 hover:ring-indigo-200">대표</button>
                <button type="button" onclick="quickSearch('123')" class="search-chip inline-flex items-center px-3 py-1 rounded-full text-[11px] font-medium bg-zinc-50 text-zinc-600 ring-1 ring-zinc-200 hover:bg-indigo-50 hover:text-indigo-700 hover:ring-indigo-200">123</button>
            </div>
        </div>

        <!-- Incoming Calls (below search) -->
        <div id="incomingCallsCard" class="mb-6 fade-in-up"></div>

        <!-- Results -->
        <div id="merchantResultsPanel" class="bg-white rounded-xl ring-1 ring-zinc-200/60 shadow-sm overflow-hidden fade-in-up">
            <div id="resultsSummaryBar" class="hidden px-5 sm:px-6 py-3.5 border-b border-zinc-100 bg-zinc-50/80 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                <div class="flex flex-wrap items-center gap-2 text-sm">
                    <span class="text-zinc-500">검색어</span>
                    <span id="resultsSummaryKeyword" class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-semibold bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100"></span>
                    <span id="resultsSummaryCount" class="text-zinc-600 font-medium"></span>
                </div>
                <button type="button" onclick="resetSearch()" class="inline-flex items-center gap-1.5 text-xs font-medium text-zinc-600 hover:text-indigo-700 hover:bg-indigo-50 px-3 py-1.5 rounded-lg ring-1 ring-zinc-200 hover:ring-indigo-200 transition-all">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    새 검색
                </button>
            </div>
            <div id="merchantCardList" class="merchant-card-grid p-4 sm:p-6 space-y-4 max-w-3xl mx-auto w-full"></div>
        </div>

        <!-- Cute animal slideshow (20 images / hour, 8s auto) -->
        <div id="cuteAnimalPanel" class="mt-4 fade-in-up max-w-sm mx-auto w-full">
            <div class="bg-white rounded-xl ring-1 ring-zinc-200/60 shadow-sm overflow-hidden">
                <div class="relative h-28 sm:h-32 bg-gradient-to-br from-zinc-50 to-indigo-50/40 flex items-center justify-center px-10 overflow-hidden">
                    <button type="button" id="cuteAnimalPrevBtn" onclick="prevCuteAnimal()" class="hidden absolute left-1.5 z-10 w-7 h-7 rounded-full bg-white/90 ring-1 ring-zinc-200 text-zinc-600 hover:bg-indigo-50 hover:text-indigo-700 shadow-sm transition-all" aria-label="이전 사진">
                        <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <img id="cuteAnimalImage" class="hidden max-h-[6.5rem] sm:max-h-[7.5rem] max-w-full w-auto object-contain" alt="귀여운 동물">
                    <div id="cuteAnimalPlaceholder" class="text-xs text-zinc-400">불러오는 중...</div>
                    <button type="button" id="cuteAnimalNextBtn" onclick="nextCuteAnimal(true)" class="hidden absolute right-1.5 z-10 w-7 h-7 rounded-full bg-white/90 ring-1 ring-zinc-200 text-zinc-600 hover:bg-indigo-50 hover:text-indigo-700 shadow-sm transition-all" aria-label="다음 사진">
                        <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
                <div id="cuteAnimalMeta" class="hidden px-3 py-1.5 border-t border-zinc-100 bg-zinc-50/80 flex items-center justify-between text-[10px] text-zinc-500">
                    <span id="cuteAnimalCounter">1 / 20</span>
                    <span id="cuteAnimalLabel" class="text-zinc-400">8초마다 자동 전환</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- History Modal -->
<div id="historyModal" class="fixed inset-0 z-50 hidden bg-zinc-900/40 backdrop-blur-sm flex justify-center items-center p-4 sm:p-6">
    <div class="bg-white rounded-xl shadow-2xl shadow-zinc-900/10 w-full h-full flex flex-col overflow-hidden max-w-5xl ring-1 ring-zinc-200/60">
        <div class="bg-white px-5 sm:px-6 py-4 flex justify-between items-center border-b border-zinc-200">
            <div>
                <h3 class="text-base font-bold text-zinc-900" id="historyModalTitle">가맹점 최근 통화내역</h3>
                <p class="text-xs text-zinc-500 mt-0.5">실시간 수신 매핑 및 핵심 히스토리 레코드</p>
            </div>
            <button onclick="closeModal()" class="text-zinc-400 hover:text-zinc-700 p-2 rounded-full hover:bg-zinc-100 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex-1 overflow-auto p-4 sm:p-6 bg-zinc-50/50 custom-scrollbar">
            <div class="bg-white rounded-xl ring-1 ring-zinc-200/60 shadow-sm overflow-hidden">
                <div class="px-5 sm:px-6 py-4 border-b border-zinc-100 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="text-zinc-500 text-xs font-medium">년도 필터</span>
                        <div id="historyYearFilters" class="flex flex-wrap gap-1.5"></div>
                        <span class="text-zinc-300 hidden sm:inline">|</span>
                        <button type="button" id="skipEmptyHistoryBtn" onclick="toggleSkipEmptyHistory()" class="bg-white text-zinc-600 ring-1 ring-zinc-200 px-3 py-1.5 rounded-full text-[11px] hover:bg-zinc-50 transition-all">내용 없는 건 숨기기</button>
                    </div>
                    <div id="historyFilterSummary" class="inline-flex items-center gap-2 text-xs font-medium text-zinc-600 bg-zinc-100 px-2.5 py-1 rounded-full">0건</div>
                </div>
                <div id="historyCardList" class="p-4 sm:p-6 space-y-4 custom-scrollbar max-w-3xl mx-auto w-full"></div>
            </div>
        </div>
    </div>
</div>

<!-- Incoming Calls Modal -->
<div id="incomingCallsModal" class="fixed inset-0 z-50 hidden bg-zinc-900/40 backdrop-blur-sm flex justify-center items-center p-4 sm:p-6">
    <div class="bg-white rounded-xl shadow-2xl shadow-zinc-900/10 w-full h-full flex flex-col overflow-hidden max-w-3xl ring-1 ring-zinc-200/60">
        <div class="bg-white px-5 sm:px-6 py-4 flex justify-between items-center border-b border-zinc-200">
            <div>
                <h3 class="text-base font-bold text-zinc-900" id="incomingCallsModalTitle">수신 통화</h3>
                <p class="text-xs text-zinc-500 mt-0.5">날짜별 수신(인입) 통화 목록</p>
            </div>
            <button onclick="closeIncomingModal()" class="text-zinc-400 hover:text-zinc-700 p-2 rounded-full hover:bg-zinc-100 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="px-5 sm:px-6 py-3 border-b border-zinc-100 bg-zinc-50/80 flex flex-wrap items-center gap-2">
            <button type="button" onclick="shiftIncomingDate(-1)" class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium bg-white text-zinc-700 ring-1 ring-zinc-200 hover:bg-indigo-50 hover:text-indigo-700 transition-all">&lt; 이전</button>
            <input type="date" id="incomingDateInput" onchange="onIncomingDateInputChange()" class="text-xs font-medium bg-white ring-1 ring-zinc-200 rounded-lg px-3 py-1.5 text-zinc-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
            <button type="button" id="incomingNextDayBtn" onclick="shiftIncomingDate(1)" class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium bg-white text-zinc-700 ring-1 ring-zinc-200 hover:bg-indigo-50 hover:text-indigo-700 transition-all">다음 &gt;</button>
            <button type="button" onclick="goIncomingToday()" class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition-all">오늘</button>
            <button type="button" id="showOnlyIncomingContentBtn" onclick="toggleShowOnlyIncomingContent()" class="bg-white text-zinc-600 ring-1 ring-zinc-200 px-3 py-1.5 rounded-full text-[11px] hover:bg-zinc-50 transition-all">통화내용이 있는 카드만 보기</button>
            <span id="incomingCallsCount" class="ml-auto text-xs font-medium text-zinc-600 bg-zinc-100 px-2.5 py-1 rounded-full">0건</span>
        </div>
        <div class="flex-1 overflow-auto p-4 sm:p-6 bg-zinc-50/50 custom-scrollbar">
            <div id="incomingCallsCardList" class="space-y-3 max-w-2xl mx-auto w-full"></div>
        </div>
    </div>
</div>

<script>
    const modalEl = document.getElementById('historyModal');
    const incomingModalEl = document.getElementById('incomingCallsModal');
    let historyItemsForModal = [];
    let activeHistoryYear = 'all';
    let skipEmptyHistory = false;
    let currentSearchKeyword = '';
    let activeIncomingDate = '';
    let incomingCallsItems = [];
    let showOnlyIncomingWithContent = false;
    let cuteAnimalRefreshTimer = null;
    let cuteAnimalSlideTimer = null;
    let cuteAnimalItems = [];
    let cuteAnimalIndex = 0;
    const CUTE_ANIMAL_SLIDE_MS = 8000;

    function hasHistoryText(value) {
        const v = (value ?? '').toString().trim();
        return v !== '' && v !== '-';
    }

    function isEmptyHistoryCard(h) {
        return !hasHistoryText(h.content) && !hasHistoryText(h.res);
    }

    function isEmptyIncomingCard(item) {
        return !hasHistoryText(item.content);
    }

    function compareRegiTimeDesc(a, b) {
        const ta = (a.regi_time || a.regi_date || '').toString();
        const tb = (b.regi_time || b.regi_date || '').toString();
        return tb.localeCompare(ta);
    }

    function getYearFromRegiTime(regi_time) {
        if (!regi_time) return '';
        const yearMatch = regi_time.match(/^(\d{4})/);
        if (yearMatch) return yearMatch[1];
        const d = new Date(regi_time);
        return Number.isFinite(d.getFullYear()) ? String(d.getFullYear()) : '';
    }

    function setCuteAnimalControlsVisible(visible) {
        ['cuteAnimalPrevBtn', 'cuteAnimalNextBtn', 'cuteAnimalMeta'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden', !visible);
        });

    function updateCuteAnimalCounter() {
        const counter = document.getElementById('cuteAnimalCounter');
        if (counter) {
            counter.textContent = cuteAnimalItems.length
                ? `${cuteAnimalIndex + 1} / ${cuteAnimalItems.length}`
                : '0 / 0';
        }
    }

    function showCuteAnimalEmpty(message = '이미지 없음') {
        const img = document.getElementById('cuteAnimalImage');
        const placeholder = document.getElementById('cuteAnimalPlaceholder');
        stopCuteAnimalSlideshow();
        setCuteAnimalControlsVisible(false);
        cuteAnimalItems = [];
        cuteAnimalIndex = 0;
        if (img) {
            img.classList.add('hidden');
            img.removeAttribute('src');
            img.classList.remove('cute-animal-animate-next', 'cute-animal-animate-prev');
        }
        if (placeholder) {
            placeholder.textContent = message;
            placeholder.classList.remove('hidden');
        }
    }

    function playCuteAnimalAnimation(direction = 'next') {
        const img = document.getElementById('cuteAnimalImage');
        if (!img) return;
        img.classList.remove('cute-animal-animate-next', 'cute-animal-animate-prev');
        void img.offsetWidth;
        img.classList.add(direction === 'prev' ? 'cute-animal-animate-prev' : 'cute-animal-animate-next');
    }

    function displayCuteAnimalAt(index, direction = 'next', animate = true) {
        if (!cuteAnimalItems.length) {
            showCuteAnimalEmpty();
            return;
        }

        const img = document.getElementById('cuteAnimalImage');
        const placeholder = document.getElementById('cuteAnimalPlaceholder');
        if (!img || !placeholder) return;

        cuteAnimalIndex = ((index % cuteAnimalItems.length) + cuteAnimalItems.length) % cuteAnimalItems.length;
        const item = cuteAnimalItems[cuteAnimalIndex];
        const url = item.image_url || item.url;

        placeholder.textContent = '불러오는 중...';
        placeholder.classList.remove('hidden');
        img.classList.add('hidden');

        const loader = new Image();
        loader.onload = () => {
            img.src = url;
            placeholder.classList.add('hidden');
            img.classList.remove('hidden');
            setCuteAnimalControlsVisible(true);
            updateCuteAnimalCounter();
            if (animate) playCuteAnimalAnimation(direction);
        };
        loader.onerror = () => {
            if (cuteAnimalItems.length > 1) {
                displayCuteAnimalAt(cuteAnimalIndex + 1, direction, animate);
                return;
            }
            showCuteAnimalEmpty('이미지 없음');
        };
        loader.src = url;
    }

    function stopCuteAnimalSlideshow() {
        if (cuteAnimalSlideTimer) {
            clearInterval(cuteAnimalSlideTimer);
            cuteAnimalSlideTimer = null;
        }
    }

    function startCuteAnimalSlideshow() {
        stopCuteAnimalSlideshow();
        if (cuteAnimalItems.length < 2) return;
        cuteAnimalSlideTimer = setInterval(() => {
            displayCuteAnimalAt(cuteAnimalIndex + 1, 'next', true);
        }, CUTE_ANIMAL_SLIDE_MS);
    }

    function resetCuteAnimalSlideshowTimer() {
        if (cuteAnimalItems.length < 2) return;
        startCuteAnimalSlideshow();
    }

    function prevCuteAnimal() {
        if (!cuteAnimalItems.length) return;
        displayCuteAnimalAt(cuteAnimalIndex - 1, 'prev', true);
        resetCuteAnimalSlideshowTimer();
    }

    function nextCuteAnimal(manual = true) {
        if (!cuteAnimalItems.length) return;
        displayCuteAnimalAt(cuteAnimalIndex + 1, 'next', true);
        if (manual) resetCuteAnimalSlideshowTimer();
    }

    function loadCuteAnimal() {
        const placeholder = document.getElementById('cuteAnimalPlaceholder');
        if (placeholder) {
            placeholder.textContent = '불러오는 중...';
            placeholder.classList.remove('hidden');
        }
        setCuteAnimalControlsVisible(false);

        secureFetch('/api/cute-animal')
            .then(data => {
                if (!data?.ok || !Array.isArray(data.items) || !data.items.length) {
                    showCuteAnimalEmpty(data?.message || '이미지 없음');
                    return;
                }
                cuteAnimalItems = data.items;
                cuteAnimalIndex = 0;
                displayCuteAnimalAt(0, 'next', true);
                startCuteAnimalSlideshow();
            })
            .catch(() => showCuteAnimalEmpty('이미지 없음'));
    }

    function initCuteAnimal() {
        loadCuteAnimal();
        if (cuteAnimalRefreshTimer) clearInterval(cuteAnimalRefreshTimer);
        cuteAnimalRefreshTimer = setInterval(() => loadCuteAnimal(), 60 * 60 * 1000);
    }

        const yearFiltered = getYearFilteredHistoryItems();
        if (!skipEmptyHistory) return yearFiltered;
        return yearFiltered.filter(h => !isEmptyHistoryCard(h));

    function renderHistoryFilterSummary(displayCount, hiddenCount) {
        const summary = document.getElementById('historyFilterSummary');
        if (!summary) return;
        if (hiddenCount > 0) {
            summary.innerHTML = `<span>${displayCount.toLocaleString()}건</span><span class="text-zinc-400">·</span><span class="text-indigo-600">${hiddenCount.toLocaleString()}건 숨김</span>`;

        }
        summary.textContent = `${displayCount.toLocaleString()}건`;

    function renderHistoryRows() {
        const cardList = document.getElementById('historyCardList');
        const yearFiltered = getYearFilteredHistoryItems();
        const items = getFilteredHistoryItems();
        const hiddenCount = skipEmptyHistory ? yearFiltered.filter(isEmptyHistoryCard).length : 0;

        if (!yearFiltered || yearFiltered.length === 0) {
            renderHistoryFilterSummary(0, 0);
            cardList.innerHTML = emptyStateHtml('통화 이력이 없습니다', '해당 년도의 통화 이력이 확인되지 않습니다.');
            return;
        }

        if (!items || items.length === 0) {
            renderHistoryFilterSummary(0, hiddenCount);
            cardList.innerHTML = emptyStateHtml(
                '표시할 통화 이력이 없습니다',
                skipEmptyHistory ? '내용 없는 건 숨기기를 해제해 보세요.' : '해당 년도의 통화 이력이 확인되지 않습니다.'
            );
            return;
        }

        renderHistoryFilterSummary(items.length, hiddenCount);
        cardList.innerHTML = items.map(h => buildHistoryCard(h)).join('');

    function formatSyncTime(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function updateSyncStatusBar(data) {
        const bar = document.getElementById('syncStatusBar');
        const timeEl = document.getElementById('syncStatusTime');
        const warnEl = document.getElementById('syncStatusWarning');
        const syncBtn = document.getElementById('syncTriggerBtn');
        if (!bar || !timeEl || !warnEl) return;

        bar.classList.remove('hidden', 'bg-amber-50', 'border-amber-200/80', 'bg-zinc-50', 'border-zinc-200/80', 'bg-emerald-50', 'border-emerald-200/80');
        warnEl.classList.remove('text-amber-700', 'text-emerald-700');

        if (!data || !data.mdb_available) {
            bar.classList.add('bg-amber-50', 'border-amber-200/80');
            timeEl.textContent = 'MDB 없음';
            warnEl.textContent = '데이터 파일 없음 — SMB 마운트 후 동기화 버튼을 눌러 주세요';
            warnEl.classList.add('text-amber-700');
            warnEl.classList.remove('hidden');
            if (syncBtn) syncBtn.disabled = false;
            return;
        }

        timeEl.textContent = data.synced_at ? formatSyncTime(data.synced_at) : '동기화 이력 없음';

        if (!data.mount_available) {
            bar.classList.add('bg-amber-50', 'border-amber-200/80');
            if (data.mount_stale) {
                warnEl.textContent = '원본 서버 마운트 끊김 — 호스트에서 자동 복구 중(최대 10분), 잠시 후 다시 동기화하세요';
            } else {
                warnEl.textContent = '원본 서버 연결 불가 — 최종 복사본 사용 중';
            }
            warnEl.classList.add('text-amber-700');
            warnEl.classList.remove('hidden');
            if (syncBtn) syncBtn.disabled = false;
            return;
        }

        if (!data.synced_at) {
            bar.classList.add('bg-amber-50', 'border-amber-200/80');
            warnEl.textContent = '동기화 버튼으로 최신 데이터를 가져올 수 있습니다';
            warnEl.classList.add('text-amber-700');
            warnEl.classList.remove('hidden');
            if (syncBtn) syncBtn.disabled = false;
            return;
        }

        if (data.is_stale) {
            bar.classList.add('bg-amber-50', 'border-amber-200/80');
            warnEl.textContent = '최종 복사본이 오래됨 — 동기화 버튼으로 갱신하세요';
            warnEl.classList.add('text-amber-700');
            warnEl.classList.remove('hidden');
        } else {
            bar.classList.add('bg-zinc-50', 'border-zinc-200/80');
            warnEl.classList.add('hidden');
        }
        if (syncBtn) syncBtn.disabled = false;
    }

    function triggerMdbSync() {
        const syncBtn = document.getElementById('syncTriggerBtn');
        const warnEl = document.getElementById('syncStatusWarning');
        if (syncBtn) {
            syncBtn.disabled = true;
            syncBtn.textContent = '동기화 중...';
        }
        if (warnEl) {
            warnEl.textContent = '마운트 폴더에서 MDB를 복사하는 중입니다...';
            warnEl.classList.remove('hidden');
            warnEl.classList.remove('text-emerald-700');
            warnEl.classList.add('text-amber-700');
        }

        secureFetch('/api/sync/trigger', { method: 'POST' })
            .then(data => {
                updateSyncStatusBar(data);
                if (warnEl) {
                    warnEl.textContent = data.message || (data.ok ? '동기화 완료' : '동기화 실패');
                    warnEl.classList.remove('hidden');
                    warnEl.classList.toggle('text-emerald-700', !!data.ok);
                    warnEl.classList.toggle('text-amber-700', !data.ok);
                }
                if (data.ok && !incomingModalEl.classList.contains('hidden') && activeIncomingDate) {
                    loadIncomingCalls(activeIncomingDate);
                }
            })
            .catch(() => {
                if (warnEl) {
                    warnEl.textContent = '동기화 요청에 실패했습니다';
                    warnEl.classList.remove('hidden');
                    warnEl.classList.add('text-amber-700');
                }
            })
            .finally(() => {
                if (syncBtn) {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        데이터 동기화
                    `;
                }
            });
    }

    function loadSyncStatus() {
        return secureFetch('/api/sync/status')
            .then(updateSyncStatusBar)
            .catch(() => updateSyncStatusBar(null));
    }

    function handleLogin(event) {
        event.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const errEl = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        errEl.classList.add('hidden');
        loginBtn.disabled = true;
        loginBtn.innerText = '인증 중...';

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        })
        .then(res => {
            if (!res.ok) throw new Error('아이디 혹은 비밀번호 오류');
            return res.json();
        })
        .then(data => {
            localStorage.setItem('vcall_token', data.access_token);
            localStorage.setItem('vcall_username', data.username);
            if (document.getElementById('rememberUsername').checked) {
                localStorage.setItem('vcall_saved_username', u);
            } else {
                localStorage.removeItem('vcall_saved_username');
            }
            location.reload();
        })
        .catch(err => {
            errEl.innerText = err.message;
            errEl.classList.remove('hidden');
            loginBtn.disabled = false;
            loginBtn.innerText = '인증 및 시스템 접속';
        });
    }

    function handleLogout() {
        const savedUsername = localStorage.getItem('vcall_saved_username');
        localStorage.clear();
        if (savedUsername) {
            localStorage.setItem('vcall_saved_username', savedUsername);
        }
        location.reload();
    }

    function secureFetch(url, options = {}) {
        const token = localStorage.getItem('vcall_token');
        return fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                'Authorization': `Bearer ${token}`
            }
        }).then(res => {
            if (res.status === 401) {
                alert('인증 세션이 만료되어 로그아웃됩니다.');
                handleLogout();
            }
            return res.json();
        });
    }

    function handleSearch(event) {
        event.preventDefault();
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) { alert('검색어를 입력해 주세요.'); return; }
        loadData(keyword);
    }

    function buildMerchantCard(item) {
        const delayClass = getDelayBadgeClass(item.delay_info);
        const field = (label, value, extraClass = '', valueClass = '') => `
            <div class="${extraClass}">
                <dt class="text-[11px] font-medium text-zinc-400 mb-0.5">${label}</dt>
                <dd class="text-sm text-zinc-800 break-words ${valueClass}">${value || '-'}</dd>
            </div>
        `;
        return `
            <div class="merchant-card bg-zinc-50/50 rounded-xl ring-1 ring-zinc-200/60 shadow-sm p-4 sm:p-5 cursor-pointer hover:ring-indigo-300 hover:shadow-md transition-all active:scale-[0.99]" data-saup="${item.saup_no || ''}" data-tel="${item.tel_no || ''}" data-name="${item.name || ''}">
                <div class="flex items-start justify-between gap-3 mb-4 pb-4 border-b border-zinc-200/80 max-w-3xl mx-auto">
                    <div class="min-w-0">
                        <p class="text-[11px] font-medium text-indigo-600 mb-1">가맹점명</p>
                        <h3 class="text-base font-bold text-zinc-900 break-words">${item.name || '-'}</h3>
                    </div>
                    <div class="flex items-center gap-1 text-xs font-medium text-indigo-500 flex-shrink-0 mt-1">
                        <span>통화 이력</span>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </div>
                </div>
                <dl class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-3 max-w-3xl mx-auto">
                    ${field('사업자번호', item.saup_no, '', 'font-mono')}
                    ${field('핸드폰번호', item.tel_no)}
                    ${field('대표자', item.presi_name)}
                    ${field('등록일자', item.regi_date, '', 'font-mono')}
                    <div>
                        <dt class="text-[11px] font-medium text-zinc-400 mb-0.5">업체유형</dt>
                        <dd><span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100">${item.mer_type || '-'}</span></dd>
                    </div>
                    <div>
                        <dt class="text-[11px] font-medium text-zinc-400 mb-0.5">연체정보</dt>
                        <dd><span class="${delayClass}">${item.delay_info || '정상'}</span></dd>
                    </div>
                    ${field('주소', item.addr, 'col-span-2 md:col-span-3')}
                    ${field('비고', item.bigo, 'col-span-2 md:col-span-3')}
                </dl>
            </div>
        `;
    }

    function attachMerchantCardListeners(container) {
        container.querySelectorAll('.merchant-card').forEach(card => {
            card.addEventListener('click', () => {
                openHistory(card.dataset.saup, card.dataset.tel, card.dataset.name);
            });
        });
    }

    function loadData(searchKeyword) {
        const cardList = document.getElementById('merchantCardList');
        const panel = document.getElementById('merchantResultsPanel');

        currentSearchKeyword = searchKeyword;
        if (panel) panel.classList.remove('hidden');
        cardList.innerHTML = loadingStateHtml('마스터 데이터를 조회 중입니다...');

        secureFetch(`/api/merchants?search=${encodeURIComponent(searchKeyword)}`)
            .then(data => {
                if (!data || data.length === 0) {
                    updateResultsSummary(searchKeyword, 0);
                    cardList.innerHTML = emptyStateHtml('일치하는 데이터가 없습니다', '검색 조건을 변경해 다시 시도해 주세요.');
                    return;
                }

                updateResultsSummary(searchKeyword, data.length);
                cardList.innerHTML = data.map(item => buildMerchantCard(item)).join('');
                attachMerchantCardListeners(cardList);
            }).catch(() => {
                updateResultsSummary(searchKeyword, 0);
                cardList.innerHTML = errorStateHtml('데이터 로드 실패');
            });
    }

    function openHistory(saupNo, telNo, merName) {
        const cardList = document.getElementById('historyCardList');
        document.getElementById('historyModalTitle').innerHTML = `<span class="text-indigo-600">${merName}</span> <span class="text-zinc-400 font-normal">통화내역</span>`;
        document.getElementById('historyFilterSummary').innerText = '0건';
        document.getElementById('historyYearFilters').innerHTML = '';
        skipEmptyHistory = false;
        updateSkipEmptyHistoryButton();
        cardList.innerHTML = loadingStateHtml('통화 히스토리를 조회 중입니다...');
        modalEl.classList.remove('hidden');

        secureFetch(`/api/history?saup_no=${encodeURIComponent(saupNo)}&tel_no=${encodeURIComponent(telNo)}`)
            .then(data => {
                historyItemsForModal = data || [];
                activeHistoryYear = 'all';
                if (!historyItemsForModal || historyItemsForModal.length === 0) {
                    cardList.innerHTML = emptyStateHtml('통화 이력이 없습니다', '해당 가맹점의 통합 통화 이력이 확인되지 않습니다.');
                    return;
                }
                renderHistoryFilterButtons(historyItemsForModal);
                renderHistoryRows();
            }).catch(() => {
                cardList.innerHTML = errorStateHtml('통화 이력 로드에 실패했습니다.');
            });
    }

    function closeModal() { modalEl.classList.add('hidden'); }

    function todayKst() {
        const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        }).formatToParts(new Date());
        const y = parts.find(p => p.type === 'year').value;
        const m = parts.find(p => p.type === 'month').value;
        const d = parts.find(p => p.type === 'day').value;
        return `${y}-${m}-${d}`;
    }

    function addDaysToDateStr(dateStr, delta) {
        const [y, m, d] = dateStr.split('-').map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d + delta));
        return dt.toISOString().slice(0, 10);
    }

    function updateIncomingDateControls() {
        const input = document.getElementById('incomingDateInput');
        const nextBtn = document.getElementById('incomingNextDayBtn');
        if (input) input.value = activeIncomingDate;
        if (nextBtn) {
            const isToday = activeIncomingDate === todayKst();
            nextBtn.disabled = isToday;
            nextBtn.classList.toggle('opacity-40', isToday);
            nextBtn.classList.toggle('cursor-not-allowed', isToday);
        }
    }

    function isUnregisteredIncomingName(name) {
        return (name || '').trim().includes('미등록');
    }

    function handleIncomingCallCardClick(card) {
        const saup = card.dataset.saup || '';
        const tel = card.dataset.tel || '';
        const name = card.dataset.name || '';

        closeIncomingModal();

        if (isUnregisteredIncomingName(name) && hasHistoryText(tel)) {
            document.getElementById('searchInput').value = tel;
            loadData(tel);
            document.getElementById('merchantResultsPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
            return;
        }

        if (hasHistoryText(saup) || hasHistoryText(tel)) {
            openHistory(saup, tel, name);
        }
    }

    function buildIncomingCallCard(item) {
        const isUnregistered = isUnregisteredIncomingName(item.mer_name);
        const canOpenHistory = !isUnregistered && (hasHistoryText(item.saup_no) || hasHistoryText(item.tel_no));
        const canSearchByTel = isUnregistered && hasHistoryText(item.tel_no);
        const isInteractive = canOpenHistory || canSearchByTel;
        const interactiveClass = isInteractive
            ? 'incoming-call-card cursor-pointer hover:ring-indigo-300 hover:shadow-md transition-all active:scale-[0.99]'
            : '';
        const actionLabel = canSearchByTel ? '가맹점 조회' : '통화 이력';
        return `
            <div class="bg-white rounded-xl ring-1 ring-zinc-200/60 shadow-sm p-4 sm:p-5 ${interactiveClass}" data-saup="${item.saup_no || ''}" data-tel="${item.tel_no || ''}" data-name="${item.mer_name || ''}">
                <div class="flex items-start justify-between gap-3 mb-2">
                    <p class="text-[11px] font-medium text-indigo-600 font-mono">${item.regi_time || item.regi_date || '-'}</p>
                    ${isInteractive ? `
                        <div class="flex items-center gap-1 text-xs font-medium text-indigo-500 flex-shrink-0">
                            <span>${actionLabel}</span>
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </div>
                    ` : ''}
                </div>
                <h4 class="text-base font-bold text-zinc-900 mb-2 break-words">${item.mer_name || '-'}</h4>
                <p class="text-sm text-zinc-700 whitespace-pre-wrap break-words">${item.content || '-'}</p>
                ${item.tel_no ? `<p class="text-xs text-zinc-400 mt-2 font-mono">${item.tel_no}</p>` : ''}
            </div>
        `;
    }

    function attachIncomingCallCardListeners(container) {
        container.querySelectorAll('.incoming-call-card').forEach(card => {
            card.addEventListener('click', () => handleIncomingCallCardClick(card));
        });
    }

    function updateShowOnlyIncomingContentButton() {
        const btn = document.getElementById('showOnlyIncomingContentBtn');
        if (!btn) return;
        btn.className = showOnlyIncomingWithContent
            ? 'bg-indigo-600 text-white px-3 py-1.5 rounded-full text-[11px] font-semibold shadow-sm transition-all'
            : 'bg-white text-zinc-600 ring-1 ring-zinc-200 px-3 py-1.5 rounded-full text-[11px] hover:bg-zinc-50 transition-all';
    }

    function renderIncomingCallsCount(displayCount, hiddenCount) {
        const countEl = document.getElementById('incomingCallsCount');
        if (!countEl) return;
        if (hiddenCount > 0) {
            countEl.innerHTML = `<span>${displayCount.toLocaleString()}건</span><span class="text-zinc-400 mx-1">·</span><span class="text-indigo-600">${hiddenCount.toLocaleString()}건 숨김</span>`;
            return;
        }
        countEl.textContent = `${displayCount.toLocaleString()}건`;
    }

    function getFilteredIncomingCalls() {
        const sorted = [...incomingCallsItems].sort(compareRegiTimeDesc);
        if (!showOnlyIncomingWithContent) return sorted;
        return sorted.filter(item => !isEmptyIncomingCard(item));
    }

    function renderIncomingCallRows() {
        const titleEl = document.getElementById('incomingCallsModalTitle');
        const cardList = document.getElementById('incomingCallsCardList');
        const dateLabel = activeIncomingDate;
        const allItems = [...incomingCallsItems].sort(compareRegiTimeDesc);
        const items = getFilteredIncomingCalls();
        const hiddenCount = showOnlyIncomingWithContent ? allItems.filter(isEmptyIncomingCard).length : 0;

        if (titleEl) titleEl.textContent = `${dateLabel} 수신 통화`;
        updateIncomingDateControls();
        updateShowOnlyIncomingContentButton();

        if (!allItems.length) {
            renderIncomingCallsCount(0, 0);
            cardList.innerHTML = emptyStateHtml(
                '수신 통화가 없습니다',
                `${dateLabel} 날짜의 수신(인입) 통화가 확인되지 않습니다.`
            );
            return;
        }

        if (!items.length) {
            renderIncomingCallsCount(0, hiddenCount);
            cardList.innerHTML = emptyStateHtml(
                '표시할 수신 통화가 없습니다',
                '통화내용이 있는 카드만 보기를 해제해 보세요.'
            );
            return;
        }

        renderIncomingCallsCount(items.length, hiddenCount);
        cardList.innerHTML = items.map(buildIncomingCallCard).join('');
        attachIncomingCallCardListeners(cardList);
    }

    function renderIncomingCalls(data) {
        incomingCallsItems = data?.items || [];
        activeIncomingDate = data?.date || activeIncomingDate;
        renderIncomingCallRows();
    }

    function toggleShowOnlyIncomingContent() {
        showOnlyIncomingWithContent = !showOnlyIncomingWithContent;
        renderIncomingCallRows();
    }

    function loadIncomingCalls(date) {
        activeIncomingDate = date;
        const cardList = document.getElementById('incomingCallsCardList');
        const titleEl = document.getElementById('incomingCallsModalTitle');
        if (titleEl) titleEl.textContent = `${date} 수신 통화`;
        if (cardList) cardList.innerHTML = loadingStateHtml('수신 통화를 조회 중입니다...');
        updateIncomingDateControls();

        return secureFetch(`/api/history/incoming?date=${encodeURIComponent(date)}`)
            .then(renderIncomingCalls)
            .catch(() => {
                if (cardList) cardList.innerHTML = errorStateHtml('수신 통화 로드에 실패했습니다.');
            });
    }

    function openIncomingCalls() {
        activeIncomingDate = todayKst();
        incomingModalEl.classList.remove('hidden');
        loadIncomingCalls(activeIncomingDate);
    }

    function closeIncomingModal() {
        incomingModalEl.classList.add('hidden');
    }

    function shiftIncomingDate(delta) {
        const next = addDaysToDateStr(activeIncomingDate, delta);
        if (delta > 0 && next > todayKst()) return;
        loadIncomingCalls(next);
    }

    function goIncomingToday() {
        loadIncomingCalls(todayKst());
    }

    function onIncomingDateInputChange() {
        const input = document.getElementById('incomingDateInput');
        if (!input || !input.value) return;
        if (input.value > todayKst()) {
            input.value = todayKst();
            loadIncomingCalls(todayKst());
            return;
        }
        loadIncomingCalls(input.value);
    }

    window.addEventListener('keydown', e => {
        if (e.key !== 'Escape') return;
        if (!incomingModalEl.classList.contains('hidden')) closeIncomingModal();
        else closeModal();
    });
</script>
</body>
</html>
